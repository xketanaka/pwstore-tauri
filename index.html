<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pwstore</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>

    <!-- 初期化画面 -->
    <div data-screen="init" class="screen screen-init" hidden>
      <div class="init-card">
        <div class="init-header">
          <span class="init-icon">🔒</span>
          <h1>pwstore</h1>
          <p class="init-subtitle">初期設定</p>
        </div>

        <!-- ステップ1: クライアントID・パスフレーズ -->
        <div id="init-step1">
          <p class="init-hint">
            Google Cloud Console で作成した OAuth クライアントID（デスクトップアプリ用）を入力してください。
          </p>
          <form id="init-form" novalidate>
            <div class="field">
              <label for="init-client-id">Google OAuth クライアントID</label>
              <input
                type="text"
                id="init-client-id"
                placeholder="XXXXXXXXXX.apps.googleusercontent.com"
                autocomplete="off"
                required
              />
            </div>
            <div class="field">
              <label for="init-client-secret">Google OAuth クライアントシークレット</label>
              <input
                type="password"
                id="init-client-secret"
                placeholder="GOCSPX-..."
                autocomplete="off"
                required
              />
            </div>
            <div class="field">
              <label for="init-passphrase">マスターパスフレーズ</label>
              <input
                type="password"
                id="init-passphrase"
                placeholder="8文字以上"
                autocomplete="new-password"
                required
              />
            </div>
            <div class="field">
              <label for="init-passphrase-confirm">確認（再入力）</label>
              <input
                type="password"
                id="init-passphrase-confirm"
                autocomplete="new-password"
                required
              />
            </div>
            <div id="init-error" class="error-msg" hidden></div>
            <button type="submit" id="init-submit" class="btn-primary">
              次へ（Google認証）
            </button>
          </form>
        </div>

        <!-- ステップ2: Google OAuth -->
        <div id="init-step2" hidden>
          <p class="init-hint">
            ボタンを押してブラウザでGoogleアカウントを認証してください。<br>
            認証後、自動でアプリに戻ります。
          </p>
          <button id="init-oauth-btn" class="btn-primary">
            Googleアカウントで認証する
          </button>
          <p id="init-oauth-status" class="oauth-status"></p>
          <div id="init-oauth-error" class="error-msg" hidden></div>
        </div>
      </div>
    </div>

    <!-- 検索画面 -->
    <div data-screen="search" class="screen screen-search" hidden>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="サービス名・キーワードで検索..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-drive-upload-btn" class="btn-icon" title="Driveにアップロード">↑</button>
        <button id="search-drive-download-btn" class="btn-icon" title="Driveからダウンロード">↓</button>
        <button id="search-admin-btn" class="btn-icon" title="管理画面">⚙</button>
      </div>
      <div id="search-status" class="search-status" hidden></div>
      <ul id="search-results" class="search-results" hidden></ul>
    </div>

    <!-- 管理画面 -->
    <div data-screen="admin" class="screen screen-admin" hidden>
      <div class="admin-toolbar">
        <span class="admin-title">pwstore 管理</span>
        <button id="admin-back-btn" class="btn-icon" title="検索画面へ">✕</button>
      </div>
      <div class="admin-panes">
        <div class="pane pane-category">
          <div class="pane-header">カテゴリ</div>
          <ul id="category-list" class="pane-list"></ul>
        </div>
        <div class="pane pane-service">
          <div class="pane-header">
            <span>サービス</span>
            <button id="admin-new-btn" class="btn-icon pane-header-btn" title="新規エントリ">＋</button>
          </div>
          <ul id="service-list" class="pane-list"></ul>
        </div>
        <div class="pane pane-detail">
          <div class="pane-header">アカウント情報</div>
          <div id="entry-detail" class="entry-detail">
            <p class="placeholder-text">左のリストからサービスを選択してください</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ローディング -->
    <div data-screen="loading" class="screen screen-loading">
      <span class="loading-spinner"></span>
    </div>

  </body>
</html>
